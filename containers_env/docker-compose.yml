# Wires the OnLooker stack: api + chromadb + data_seeder.
# Scaffold — adjust image/versions and env as the services solidify.

services:
  api:
    build:
      context: ..
      dockerfile: containers_env/Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - chromadb
    volumes:
      - ../chroma_data:/app/chroma_data

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - ../chroma_data:/chroma/chroma

  data_seeder:
    build:
      context: ..
      dockerfile: containers_env/Dockerfile
    env_file:
      - .env
    depends_on:
      - api
    command: ["python", "-m", "data_ingestor.seed_database"]
    restart: "no"
