# Dapr state store -> PostgreSQL to PERSIST the data in the database.
#
# The data_ingestor saves each Location (by zip_code) as a state item:
#   client.save_state("statestore", zip_code, json_of_the_location)
#
# The connection string comes from the environment (DATABASE_URL, see containers_env/.env.example).
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore
spec:
  type: state.postgresql
  version: v1
  metadata:
    - name: connectionString
      value: "{env:DATABASE_URL}"
    - name: tableName
      value: "ingestor_locations"
    - name: keyPrefix
      value: "name"            # prefixes the keys with the app-id (isolates per service)
