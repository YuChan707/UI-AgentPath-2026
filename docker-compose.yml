# OnLooker — full project stack.
#
#   make up           # infra (postgres, chromadb, ollama, redis) + ui
#   docker compose --profile pipeline up   # + product-pipeline microservices
#   make ingest       # run data_ingestor once  (Census -> locations JSON)
#   make process      # run data_processor once (synthetic audience)
#
# By default the apps talk to the LOCAL `postgres` service (init.sql is applied
# automatically on first start). To target a different Postgres, override the
# DATABASE_URL of each service.
#
# All services share Compose's default network so they reach each other by name
# (postgres, chromadb, ollama, redis, embeding-service, ...).
services:
  # ----------------------------------------------------------------- infra ---
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: onlooker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Auto-create every entity table on first init.
      - ./postgresql-db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d onlooker"]
      interval: 5s
      timeout: 5s
      retries: 10

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/data
    environment:
      - CHROMA_OPEN_TELEMETRY__ENDPOINT=${CHROMA_OPEN_TELEMETRY__ENDPOINT}
      # - CHROMA_OPEN_TELEMETRY__SERVICE_NAME=${CHROMA_OPEN_TELEMETRY__SERVICE_NAME}
      # - OTEL_EXPORTER_OTLP_HEADERS=${OTEL_EXPORTER_OTLP_HEADERS}
    restart: unless-stopped # possible values are: "no", always", "on-failure", "unless-stopped"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Dapr pub/sub broker for the product pipeline (embeding-service, ...).
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Pull the model once it is up:  make model-pull

  # ------------------------------------------------------------------ apps ---
  # UI (I/O only). It stores documents in Postgres and publishes Dapr events;
  # the product-pipeline microservices (profile "pipeline") do the work.
  ui-onlooker:
    build:
      context: ./ui-onlooker
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  # ------------------------------------------------------- one-shot jobs ----
  # Run on demand (profile "jobs"): `make ingest`, `make process`.
  data_ingestor:
    build:
      context: ./data_ingestor
      dockerfile: Dockerfile
    profiles: ["jobs"]
    env_file:
      - .env
      - data_ingestor/.env
    # Writes locations as JSON (data_ingestor/data/locations/), consumed by data_processor.
    restart: "no"

  data_processor:
    build:
      context: ./data_processor
    profiles: ["jobs"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/onlooker
      DATABASE_POOL_URL: ""
      DB_SSL: disable
      LLM_TRANSPORT: http
      LLAMA_BASE_URL: http://ollama:11434/v1
      LLAMA_MODEL: llama3.1
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: "no"

  # ----------------------------------------------- product pipeline (Dapr) ---
  # Start with:  docker compose --profile pipeline up --build
  embeding-service:
